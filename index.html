<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Resource hints for better performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preconnect to Convex backend for faster API calls -->
    <link rel="preconnect" href="https://aware-clam-410.convex.cloud" />
    <link rel="dns-prefetch" href="https://aware-clam-410.convex.cloud" />

    <!-- Prevent white flash before CSS loads -->
    <meta name="theme-color" content="#09090B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAFA" media="(prefers-color-scheme: light)" />
    <script>
      // Apply persisted theme + reduced-motion before CSS to avoid flashes on load.
      (function () {
        try {
          var raw = localStorage.getItem("nodebench-theme");
          if (!raw) return;
          var theme = JSON.parse(raw) || {};
          var mode = theme.mode || "system";
          var prefersDark =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "system" ? (prefersDark ? "dark" : "light") : mode;

          document.documentElement.dataset.theme = resolved;
          if (resolved === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");

          if (theme.reducedMotion) document.documentElement.classList.add("reduce-motion");
        } catch {
          // ignore
        }
      })();
    </script>
    <style>
      html,
      body {
        background: #fafafa;
        color: #111827;
        color-scheme: light;
      }
      @media (prefers-color-scheme: light) {
        html,
        body {
          background: #fafafa;
          color: #111827;
          color-scheme: light;
        }
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #09090b;
          color: #fafafa;
          color-scheme: dark;
        }
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #09090b;
        color: #fafafa;
        color-scheme: dark;
      }
      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #fafafa;
        color: #111827;
        color-scheme: light;
      }
    </style>

    <link rel="stylesheet" href="/src/index.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <title>NodeBench AI — Research Intelligence & Agent Workspace</title>
    <meta name="description" content="AI-powered research workspace with signals, briefings, agents, and real-time intelligence for builders and analysts." />
    <link rel="canonical" href="https://nodebench.ai/" />

    <!-- Open Graph -->
    <meta property="og:title" content="NodeBench AI — Research Intelligence & Agent Workspace" />
    <meta property="og:description" content="AI-powered research workspace with signals, briefings, agents, and real-time intelligence." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nodebench.ai/" />
    <meta property="og:image" content="/og-preview.png" />
    <meta property="og:site_name" content="NodeBench AI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NodeBench AI — Research Intelligence & Agent Workspace" />
    <meta name="twitter:description" content="AI-powered research workspace with signals, briefings, agents, and real-time intelligence." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
