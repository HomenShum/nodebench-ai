steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/nodebench-server', '-f', 'server/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nodebench-server']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nodebench-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nodebench-server'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3100'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},LINKUP_API_KEY=${_LINKUP_API_KEY},CONVEX_URL=${_CONVEX_URL}'

images:
  - 'gcr.io/$PROJECT_ID/nodebench-server'
