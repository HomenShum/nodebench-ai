# Smithery.ai MCP Server Configuration
# https://smithery.ai/docs/config

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      lane:
        type: string
        default: core
        description: "Install lane to start (core, power, admin)"
        enum:
          - core
          - power
          - admin
      preset:
        type: string
        default: default
        description: "Optional preset override when using the core package lane"
        enum:
          - default
          - founder
          - cursor
          - power
          - admin
          - core
          - banker
          - operator
          - researcher
          - web_dev
          - research
          - data
          - devops
          - academic
          - full
      geminiApiKey:
        type: string
        description: "Gemini API key for web search and entity enrichment"
      openaiApiKey:
        type: string
        description: "OpenAI API key for embeddings and LLM tools"
      githubToken:
        type: string
        description: "GitHub token for repository tools"
    required: []
  commandFunction: |-
    (config) => {
      const lane = config.lane || 'core';
      const preset = config.preset || 'default';
      const command = 'npx';
      let args;
      if (lane === 'power') {
        args = ['-y', 'nodebench-mcp-power'];
      } else if (lane === 'admin') {
        args = ['-y', 'nodebench-mcp-admin'];
      } else {
        args = preset === 'default'
          ? ['-y', 'nodebench-mcp']
          : ['-y', 'nodebench-mcp', '--preset', preset];
      }
      return {
        command,
        args,
        env: {
          ...(config.geminiApiKey ? { GEMINI_API_KEY: config.geminiApiKey } : {}),
          ...(config.openaiApiKey ? { OPENAI_API_KEY: config.openaiApiKey } : {}),
          ...(config.githubToken ? { GITHUB_TOKEN: config.githubToken } : {}),
        }
      };
    }
