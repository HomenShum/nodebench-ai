name: Notebook daily summary

# Solo-ops daily summary. Runs full load-test, posts to Notion + ntfy.

on:
  schedule:
    # 14:11 UTC = ~9am ET / ~6am PT — caught during coffee, not the middle of the night.
    - cron: "11 14 * * *"
  workflow_dispatch: {}

concurrency:
  group: notebook-daily
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run daily summary
        env:
          VITE_CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          OPS_NTFY_URL: ${{ secrets.OPS_NTFY_URL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DAILY_CLIENTS: "10"
          DAILY_DURATION: "60"
          DAILY_P95_MS_BUDGET: "500"
          DAILY_ERROR_RATE_BUDGET: "0.05"
        run: node scripts/ops/dailySummary.mjs

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notebook-daily-${{ github.run_id }}
          path: .tmp/notebook-daily-*.json
          retention-days: 90
