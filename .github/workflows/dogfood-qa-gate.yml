name: Dogfood Visual QA Gate

on:
  pull_request:
    paths:
      - ".github/workflows/dogfood-qa-gate.yml"
      - "scripts/overstory/**"
      - "scripts/ui/**"
      - "tests/e2e/**"
      - "src/**/*.tsx"
      - "src/**/*.ts"
      - "src/**/*.css"
      - "src/features/**"
      - "public/dogfood/**"
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: dogfood-qa-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  visual-qa-gate:
    name: Visual QA Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_CONVEX_URL: ${{ secrets.CONVEX_URL || vars.CONVEX_URL || 'https://agile-caribou-964.convex.cloud' }}
      CONVEX_URL: ${{ secrets.CONVEX_URL || vars.CONVEX_URL || 'https://agile-caribou-964.convex.cloud' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: |
          npx vite preview --host 127.0.0.1 --port 5173 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:5173 > /dev/null && break
            sleep 1
          done

      - name: Capture screenshots + publish gallery
        run: |
          npm run test:e2e -- tests/e2e/full-ui-dogfood.spec.ts --project=chromium --workers=1
          npm run dogfood:publish

      - name: Capture Scribe how-to
        run: npm run dogfood:scribe

      - name: Record walkthrough video
        run: npm run dogfood:record:static

      - name: Extract key frames
        run: npm run dogfood:frames

      - name: Run CI QA check
        run: node scripts/overstory/ci-qa-check.mjs

      - name: Upload dogfood artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dogfood-evidence-${{ github.sha }}
          path: |
            public/dogfood/manifest.json
            public/dogfood/walkthrough.json
            public/dogfood/frames.json
            public/dogfood/scribe.json
            public/dogfood/screenshots/
            public/dogfood/frames/
            public/dogfood/scribe/
          retention-days: 14

      - name: Comment PR with QA results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let manifestStatus = 'missing';
            let walkthroughStatus = 'missing';
            let framesStatus = 'missing';
            let scribeStatus = 'missing';
            let screenshotCount = 0;
            let chapterCount = 0;
            let frameCount = 0;
            let scribeCount = 0;

            try {
              const manifest = JSON.parse(fs.readFileSync('public/dogfood/manifest.json', 'utf8'));
              screenshotCount = (manifest.items || []).length;
              manifestStatus = screenshotCount >= 23 ? 'pass' : 'low';
            } catch {}

            try {
              const walkthrough = JSON.parse(fs.readFileSync('public/dogfood/walkthrough.json', 'utf8'));
              chapterCount = (walkthrough.chapters || []).length;
              walkthroughStatus = chapterCount >= 9 ? 'pass' : 'low';
            } catch {}

            try {
              const frames = JSON.parse(fs.readFileSync('public/dogfood/frames.json', 'utf8'));
              frameCount = (frames.items || []).length;
              framesStatus = frameCount >= 9 ? 'pass' : 'low';
            } catch {}

            try {
              const scribe = JSON.parse(fs.readFileSync('public/dogfood/scribe.json', 'utf8'));
              scribeCount = (scribe.steps || []).length;
              scribeStatus = scribeCount >= 8 ? 'pass' : 'low';
            } catch {}

            const gateResult = '${{ job.status }}' === 'success' ? 'PASSED' : 'FAILED';
            const emoji = gateResult === 'PASSED' ? ':white_check_mark:' : ':x:';

            const body = `## ${emoji} Dogfood Visual QA Gate: ${gateResult}

            | Check | Status |
            |-------|--------|
            | Screenshots | ${screenshotCount} captured (${manifestStatus}) |
            | Walkthrough | ${chapterCount} chapters (${walkthroughStatus}) |
            | Key Frames | ${frameCount} extracted (${framesStatus}) |
            | Scribe Steps | ${scribeCount} how-to steps (${scribeStatus}) |
            | Build | ${{ job.status }} |

            <details>
            <summary>Artifacts</summary>

            Download the \`dogfood-evidence-${context.sha.substring(0, 7)}\` artifact from the Actions tab for full screenshots, frames, and walkthrough video.
            </details>

            ---
            *Generated by Dogfood QA Gate*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body && c.body.includes('Dogfood Visual QA Gate')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
