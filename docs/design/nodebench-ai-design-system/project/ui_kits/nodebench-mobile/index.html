<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel" src="MobileHome.jsx"></script>
  <script type="text/babel" src="MobileChat.jsx"></script>

  <script type="text/babel">
    function App() {
      const { IOSDevice } = window;
      return (
        <div>
          <div className="stage">
            <div>
              <IOSDevice>
                <window.NBMobileHome />
              </IOSDevice>
              <div className="frame-label">Home</div>
            </div>
            <div>
              <IOSDevice>
                <window.NBMobileChat />
              </IOSDevice>
              <div className="frame-label">Chat · Answer packet</div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>

</html>
