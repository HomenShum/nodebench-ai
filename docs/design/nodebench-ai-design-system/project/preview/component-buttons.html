<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><style>body{font-family:"Inter",-apple-system,sans-serif}
.btn-primary{display:inline-flex;align-items:center;gap:8px;border-radius:16px;border:1px solid rgba(217,119,87,.24);background:linear-gradient(180deg,rgba(217,119,87,.96),rgba(198,104,74,.96));padding:10px 18px;font-size:13px;font-weight:600;color:#fffaf8;box-shadow:0 14px 34px rgba(217,119,87,.18);cursor:pointer}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;border-radius:999px;border:1px solid rgba(15,23,42,.08);background:rgba(255,255,255,.78);padding:8px 14px;font-size:13px;font-weight:500;color:#111827;cursor:pointer}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;font-size:13px;font-weight:500;color:#374151;background:transparent;border:0;border-radius:8px;cursor:pointer}
.btn-ghost:hover{background:rgba(15,23,42,.04);color:#111827}
.btn-destructive{display:inline-flex;align-items:center;gap:8px;border-radius:999px;border:1px solid rgba(220,38,38,.2);background:rgba(220,38,38,.08);padding:8px 14px;font-size:13px;font-weight:600;color:#DC2626;cursor:pointer}
</style></head>
<body><div class="card">
  <p class="kicker">Components · Buttons</p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn-primary">Save report</button>
    <button class="btn-secondary">Ask a follow-up</button>
    <button class="btn-ghost">Dismiss</button>
    <button class="btn-destructive">Delete</button>
  </div>
  <div style="margin-top:14px;display:flex;gap:10px;align-items:center">
    <button class="btn-primary" style="opacity:.45;cursor:not-allowed">Disabled</button>
    <button class="btn-secondary" style="padding:6px 10px;font-size:12px">Small</button>
    <button class="btn-primary" style="padding:6px 12px;font-size:12px;border-radius:10px">Small primary</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:999px;border:1px solid rgba(15,23,42,.08);background:rgba(255,255,255,.74);color:#111827;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
  </div>
</div></body></html>
