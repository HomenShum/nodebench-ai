<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card">
  <p class="kicker">Radius · Spacing scale</p>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;font-size:10px;color:#6B7280;margin-bottom:16px">
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:4px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">4px</div><div>xs · chips</div></div>
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:6px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">6px</div><div>sm · inputs</div></div>
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:8px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">8px</div><div>default</div></div>
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:12px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">12px</div><div>card</div></div>
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:16px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">16px</div><div>panel</div></div>
    <div><div style="height:56px;background:#F3F4F6;border:1px solid rgba(0,0,0,.06);border-radius:999px"></div><div style="margin-top:6px;font-family:'JetBrains Mono',monospace;color:#111827;font-weight:600">pill</div><div>chip/btn</div></div>
  </div>
  <div style="display:flex;align-items:end;gap:10px">
    <div style="font-size:10px;color:#6B7280"><div style="width:4px;height:4px;background:#D97757;margin-bottom:6px"></div>4</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:8px;height:8px;background:#D97757;margin-bottom:6px"></div>8</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:12px;height:12px;background:#D97757;margin-bottom:6px"></div>12</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:16px;height:16px;background:#D97757;margin-bottom:6px"></div>16 · form</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:24px;height:24px;background:#D97757;margin-bottom:6px"></div>24</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:32px;height:32px;background:#D97757;margin-bottom:6px"></div>32 · section</div>
    <div style="font-size:10px;color:#6B7280"><div style="width:48px;height:48px;background:#D97757;margin-bottom:6px"></div>48</div>
  </div>
</div></body></html>
