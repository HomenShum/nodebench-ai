<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card dark-card" style="padding:0;overflow:hidden">
  <div style="padding:16px 20px 10px">
    <p class="kicker" style="color:#99A3AE">Brand · Imagery + gradient</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
    <div style="aspect-ratio:16/9;background-image:url(../assets/hero_bg.webp);background-size:cover;background-position:center;border-top:1px solid rgba(255,255,255,.06);position:relative">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.5))"></div>
      <div style="position:absolute;bottom:10px;left:12px;font-size:11px;color:rgba(255,255,255,.75);font-weight:500">hero · particle wave</div>
    </div>
    <div style="aspect-ratio:16/9;background-image:url(../assets/dossier_preview.webp);background-size:cover;background-position:center;border-top:1px solid rgba(255,255,255,.06);position:relative">
      <div style="position:absolute;bottom:10px;left:12px;font-size:11px;color:rgba(255,255,255,.75);font-weight:500">product render · glass panels</div>
    </div>
  </div>
  <div style="padding:12px 20px 16px;display:flex;gap:10px;font-size:11px;color:#99A3AE">
    <span>Palette · cool dark + cyan/violet rim</span>
    <span style="margin-left:auto;font-family:'JetBrains Mono',monospace">webp · full-bleed</span>
  </div>
</div></body></html>
