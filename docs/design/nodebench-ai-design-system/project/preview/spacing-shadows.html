<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card" style="padding:28px 24px 32px">
  <p class="kicker">Elevation · Shadows</p>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px">
    <div style="text-align:center"><div style="height:72px;background:#fff;border-radius:12px;box-shadow:0 0 0 1px rgba(0,0,0,.02), 0 1px 2px rgba(0,0,0,.04)"></div><div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280">sm</div></div>
    <div style="text-align:center"><div style="height:72px;background:#fff;border-radius:12px;box-shadow:0 0 0 1px rgba(0,0,0,.03), 0 2px 4px rgba(0,0,0,.05), 0 12px 24px rgba(0,0,0,.05)"></div><div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280">md</div></div>
    <div style="text-align:center"><div style="height:72px;background:#fff;border-radius:12px;box-shadow:0 0 0 1px rgba(0,0,0,.03), 0 4px 8px rgba(0,0,0,.06), 0 24px 48px rgba(0,0,0,.08)"></div><div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280">lg</div></div>
    <div style="text-align:center"><div style="height:72px;background:#fff;border-radius:12px;box-shadow:0 0 0 1px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.08)"></div><div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280">hover</div></div>
    <div style="text-align:center"><div style="height:72px;background:linear-gradient(180deg,#D97757,#C6684A);border-radius:12px;box-shadow:0 14px 34px rgba(217,119,87,.3)"></div><div style="margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280">accent</div></div>
  </div>
</div></body></html>
