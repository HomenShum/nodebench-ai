<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card">
  <p class="kicker">Semantic · Status</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="border:1px solid rgba(5,150,105,.16);background:rgba(5,150,105,.08);padding:14px;border-radius:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:8px;height:8px;border-radius:50%;background:#047857"></span><span style="font-size:11px;font-weight:600;color:#047857;letter-spacing:.06em;text-transform:uppercase">Verified</span></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#047857">#047857 · success</div>
    </div>
    <div style="border:1px solid rgba(180,83,9,.2);background:rgba(180,83,9,.06);padding:14px;border-radius:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:8px;height:8px;border-radius:50%;background:#B45309"></span><span style="font-size:11px;font-weight:600;color:#B45309;letter-spacing:.06em;text-transform:uppercase">Needs Review</span></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#B45309">#B45309 · warning</div>
    </div>
    <div style="border:1px solid rgba(220,38,38,.18);background:rgba(220,38,38,.06);padding:14px;border-radius:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:8px;height:8px;border-radius:50%;background:#DC2626"></span><span style="font-size:11px;font-weight:600;color:#DC2626;letter-spacing:.06em;text-transform:uppercase">Failed</span></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#DC2626">#DC2626 · destructive</div>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
    <span style="display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(217,119,87,.24);background:rgba(217,119,87,.1);color:#AD5F45;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px">accent</span>
    <span style="display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(15,23,42,.08);background:rgba(255,255,255,.78);color:#374151;font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px">neutral</span>
    <span style="display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(5,150,105,.16);background:rgba(5,150,105,.08);color:#047857;font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px">success</span>
  </div>
</div></body></html>
