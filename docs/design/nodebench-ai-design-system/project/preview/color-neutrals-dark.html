<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"></head>
<body><div class="card dark-card">
  <p class="kicker" style="color:#99A3AE">Dark · Neutrals</p>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;font-size:10px">
    <div><div style="height:70px;border-radius:8px;background:#09090B;border:1px solid rgba(255,255,255,.08)"></div><div style="margin-top:6px;color:#99A3AE">app bg</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#09090B</div></div>
    <div><div style="height:70px;border-radius:8px;background:#111418;border:1px solid rgba(255,255,255,.08)"></div><div style="margin-top:6px;color:#99A3AE">surface</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#111418</div></div>
    <div><div style="height:70px;border-radius:8px;background:#171B20"></div><div style="margin-top:6px;color:#99A3AE">secondary</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#171B20</div></div>
    <div><div style="height:70px;border-radius:8px;background:#1B2027"></div><div style="margin-top:6px;color:#99A3AE">tertiary</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#1B2027</div></div>
    <div><div style="height:70px;border-radius:8px;background:#20262D"></div><div style="margin-top:6px;color:#99A3AE">hover</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#20262D</div></div>
    <div><div style="height:70px;border-radius:8px;background:#1B1A18;border:1px solid rgba(217,119,87,.22)"></div><div style="margin-top:6px;color:#99A3AE">paper</div><div style="font-family:'JetBrains Mono',monospace;font-weight:600">#1B1A18</div></div>
  </div>
  <div style="margin-top:16px;display:flex;gap:20px;font-size:12px">
    <div style="display:flex;align-items:center;gap:8px"><span style="width:20px;height:20px;border-radius:4px;background:#F2F4F7"></span><span style="color:#F2F4F7;font-weight:600">Primary #F2F4F7</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:20px;height:20px;border-radius:4px;background:#C6CCD4"></span><span style="color:#C6CCD4">Secondary #C6CCD4</span></div>
    <div style="display:flex;align-items:center;gap:8px"><span style="width:20px;height:20px;border-radius:4px;background:#99A3AE"></span><span style="color:#99A3AE">Muted #99A3AE</span></div>
  </div>
</div></body></html>
