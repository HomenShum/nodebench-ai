<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shell.css"><style>
@keyframes demo-lift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes demo-fade { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
.ease-expo{animation:demo-lift 2.4s cubic-bezier(0.16,1,0.3,1) infinite}
.ease-spring{animation:demo-lift 2.4s cubic-bezier(0.32,0.72,0,1) infinite}
.reveal{animation:demo-fade 320ms cubic-bezier(0.16,1,0.3,1) infinite alternate}
</style></head>
<body><div class="card">
  <p class="kicker">Motion · Easing + durations</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:14px;background:#fff">
      <div class="ease-expo" style="width:32px;height:32px;border-radius:8px;background:#D97757;margin-bottom:10px"></div>
      <div style="font-size:12px;font-weight:600">out-expo</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280;margin-top:2px">0.16, 1, 0.3, 1</div>
    </div>
    <div style="border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:14px;background:#fff">
      <div class="ease-spring" style="width:32px;height:32px;border-radius:8px;background:#D97757;margin-bottom:10px"></div>
      <div style="font-size:12px;font-weight:600">spring</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280;margin-top:2px">0.32, 0.72, 0, 1</div>
    </div>
    <div style="border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:14px;background:#fff">
      <div class="reveal" style="width:32px;height:32px;border-radius:8px;background:#D97757;margin-bottom:10px"></div>
      <div style="font-size:12px;font-weight:600">reveal-up</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#6B7280;margin-top:2px">320ms · fade + 8px</div>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:18px;font-size:11px;color:#6B7280">
    <span><code style="font-family:'JetBrains Mono',monospace;color:#D97757">fast</code> 120ms</span>
    <span><code style="font-family:'JetBrains Mono',monospace;color:#D97757">normal</code> 200ms</span>
    <span><code style="font-family:'JetBrains Mono',monospace;color:#D97757">slow</code> 400ms</span>
  </div>
</div></body></html>
