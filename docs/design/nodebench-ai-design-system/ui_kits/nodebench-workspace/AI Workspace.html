<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NodeBench · AI Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="workspace.css">
<link rel="stylesheet" href="chat.css">
<link rel="stylesheet" href="report.css">
<link rel="stylesheet" href="notebook.css">
<link rel="stylesheet" href="map.css">
<style>
  html, body, #root { height: 100%; }
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Chat.jsx"></script>
<script type="text/babel" src="Report.jsx"></script>
<script type="text/babel" src="Notebook.jsx"></script>
<script type="text/babel" src="Map.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "composerStyle": "dock",
  "notebookWidth": "narrow",
  "inspector": "visible",
  "accent": "#D97757"
}/*EDITMODE-END*/;

// Per-artboard state container.
// Each artboard is independent — users can interact with each surface in parallel.
function Artboard({ initialTab, children }) {
  const [tab, setTab] = React.useState(initialTab);
  const [thread, setThread] = React.useState('t1');
  const [rootEntity, setRootEntity] = React.useState('disco');
  const [selectedCard, setSelectedCard] = React.useState({ id: 'everlaw', name: 'Everlaw', kind: 'company' });
  const [sourceFilter, setSourceFilter] = React.useState('all');
  const [expandedClaim, setExpandedClaim] = React.useState('c3');

  return children({
    tab, setTab,
    thread, setThread,
    rootEntity, setRootEntity,
    selectedCard, setSelectedCard,
    sourceFilter, setSourceFilter,
    expandedClaim, setExpandedClaim,
  });
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
  }, [t.accent]);

  const AB = window.DCArtboard;
  const SEC = window.DCSection;

  return (
    <>
      <DesignCanvas title="NodeBench AI Workspace"
                    subtitle="Four core surfaces · one persistent scenario (DISCO legal-tech diligence) · fully interactive">

        <SEC id="chat" title="Chat surface" subtitle="Answer-first. Click threads to switch. Follow-ups become queries. Cite numbers jump to Sources.">
          <AB id="chat-1" label="Chat · interactive" width={1440} height={920}>
            <Artboard initialTab="chat">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

        <SEC id="brief" title="Report · Brief" subtitle="Executive summary → triad → receipts → timeline → watch. TOC scrolls; tab chips jump between surfaces.">
          <AB id="brief-1" label="Brief · interactive" width={1440} height={920}>
            <Artboard initialTab="brief">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

        <SEC id="cards" title="Report · Cards" subtitle="Click a related card to drill in; Inspector updates. 'Drill into' makes a card the new root. Breadcrumb walks back.">
          <AB id="cards-1" label="Cards · interactive" width={1440} height={920}>
            <Artboard initialTab="cards">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

        <SEC id="sources" title="Report · Sources" subtitle="Type filter + fresh/trust toggles. Click a claim to expand its evidence.">
          <AB id="sources-1" label="Sources · interactive" width={1440} height={920}>
            <Artboard initialTab="sources">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

        <SEC id="notebook" title="Notebook" subtitle="Editable prose. Hover citations. Accept/dismiss AI proposals. Press / for commands (keyboard nav).">
          <AB id="notebook-1" label="Notebook · interactive" width={1440} height={1020}>
            <Artboard initialTab="notebook">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

        <SEC id="map" title="Map" subtitle="Two degrees of relationship graph around the root entity. Click any node to re-center; Shift+Click to inspect without moving.">
          <AB id="map-1" label="Map · interactive" width={1440} height={920}>
            <Artboard initialTab="map">
              {(s) => (
                s.tab === 'chat'     ? <ChatSurface     tweaks={t} {...s} /> :
                s.tab === 'notebook' ? <NotebookSurface tweaks={t} tab={s.tab} setTab={s.setTab} /> :
                s.tab === 'map'      ? <MapSurface      tweaks={t} {...s} /> :
                                       <ReportSurface   tweaks={t} {...s} />
              )}
            </Artboard>
          </AB>
        </SEC>

      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Chat" />
        <TweakRadio label="Composer" value={t.composerStyle}
                    options={['dock', 'floating', 'inline']}
                    onChange={v => setTweak('composerStyle', v)} />
        <TweakSection label="Cards" />
        <TweakRadio label="Inspector" value={t.inspector}
                    options={['visible', 'hidden']}
                    onChange={v => setTweak('inspector', v)} />
        <TweakSection label="Notebook" />
        <TweakRadio label="Column width" value={t.notebookWidth}
                    options={['narrow', 'wide']}
                    onChange={v => setTweak('notebookWidth', v)} />
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent}
                    onChange={v => setTweak('accent', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
